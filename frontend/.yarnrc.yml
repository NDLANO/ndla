nodeLinker: node-modules

# Resolve benign peer-dependency warnings from third-party dev tooling whose
# nested deps request peers (typescript/react/etc.) that exist hoisted at the
# root but aren't formally provided by the intermediate package. packageExtensions
# only applies to third-party packages (not workspaces), which is why first-party
# @ndla peer needs are declared as devDependencies in the packages themselves.
packageExtensions:
  "@pandacss/extractor@*":
    dependencies:
      typescript: "*"
  "@storybook/react-vite@*":
    dependencies:
      typescript: "*"
  "storybook@*":
    dependencies:
      "@testing-library/dom": "*"
      react: "*"
      react-dom: "*"
  "@napi-rs/wasm-runtime@*":
    peerDependenciesMeta:
      "@emnapi/core":
        optional: true
      "@emnapi/runtime":
        optional: true
