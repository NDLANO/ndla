name: "CI: ndla-frontend"
on:
  workflow_dispatch:
    inputs: {}
  push:
    paths:
      - frontend/ndla-frontend/**
      - frontend/packages/**
      - frontend/package.json
      - frontend/yarn.lock
      - frontend/nx.json
      - frontend/.yarnrc.yml
      - .github/workflows/ndla-frontend_ci.yml
  pull_request:
    paths:
      - frontend/ndla-frontend/**
      - frontend/packages/**
      - frontend/package.json
      - frontend/yarn.lock
      - frontend/nx.json
      - frontend/.yarnrc.yml
      - .github/workflows/ndla-frontend_ci.yml
env:
  NDLA_RELEASES: ${{ secrets.NDLA_RELEASES }}
  GH_TOKEN: ${{ secrets.CI_NOW_GH_TOKEN }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  GH_PR_NUMBER: ${{ github.event.number }}
  GH_PR_REPO: ${{ github.event.pull_request.head.repo.full_name }}
  GH_PR_SHA: ${{ github.event.pull_request.head.sha }}
  NODE_OPTIONS: "--max-old-space-size=4096"
defaults:
  run:
    working-directory: frontend
jobs:
  unit_tests:
    name: "Unit tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: "Enable corepack"
        run: corepack enable
      - uses: actions/cache@v4
        with:
          path: |
            **/node_modules
            frontend/.yarn/cache
            frontend/.nx/cache
            frontend/**/.eslintcache
          key: ${{ runner.os }}-frontend-${{ hashFiles('frontend/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-frontend-
      - name: "Install"
        run: yarn install --immutable
      - name: "Build packages"
        run: yarn build:packages
      - name: "Check-all"
        run: yarn workspace ndla-frontend check-all
  integration_tests:
    name: "Integration tests"
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.61.0-noble
    env:
      DEFAULT_TIMEOUT: 5000
      NDLA_PERSONAL_CLIENT_ID: ${{ secrets.NDLA_PERSONAL_CLIENT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: "Enable corepack"
        run: corepack enable
      - name: "Install"
        run: yarn install --immutable
      - name: "Build packages"
        run: yarn build:packages
      - name: "Build"
        run: yarn workspace ndla-frontend build
      - name: "Deploy to vercel"
        continue-on-error: true
        if: (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false) || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        uses: ndlano/reusable-workflows/.github/actions/vercel-deploy@main
        with:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          MASTER_ALIAS: "ndla-frontend-master.vercel.app"
          REPO_NAME: "ndla-frontend"
      - name: "E2E"
        run: yarn workspace ndla-frontend e2e:headless
