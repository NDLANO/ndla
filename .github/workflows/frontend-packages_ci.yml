name: "CI: frontend-packages"
on:
  workflow_dispatch:
    inputs: {}
  push:
    paths:
      - frontend/packages/**
      - frontend/package.json
      - frontend/yarn.lock
      - frontend/nx.json
      - frontend/.yarnrc.yml
      - .github/workflows/frontend-packages_ci.yml
  pull_request:
    paths:
      - frontend/packages/**
      - frontend/package.json
      - frontend/yarn.lock
      - frontend/nx.json
      - frontend/.yarnrc.yml
      - .github/workflows/frontend-packages_ci.yml
env:
  CI_RELEASE_ROLE: ${{ secrets.CI_RELEASE_ROLE }}
  DOCKER_HUB_PASSWORD: ${{ secrets.DOCKER_HUB_PASSWORD }}
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
  NDLA_RELEASES: ${{ secrets.NDLA_RELEASES }}
  GH_TOKEN: ${{ secrets.CI_NOW_GH_TOKEN }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  GH_PR_NUMBER: ${{ github.event.number }}
  GH_PR_REPO: ${{ github.event.pull_request.head.repo.full_name }}
  GH_PR_SHA: ${{ github.event.pull_request.head.sha }}
defaults:
  run:
    working-directory: frontend
jobs:
  unit_tests:
    name: "Unit tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: "Enable corepack"
        run: corepack enable
      - uses: actions/cache@v4
        with:
          path: |
            **/node_modules
            frontend/.yarn/cache
            frontend/.nx/cache
            frontend/**/.eslintcache
          key: ${{ runner.os }}-frontend-${{ hashFiles('frontend/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-frontend-
      - name: "Install"
        run: yarn install --immutable
      - name: "Build packages"
        run: yarn build:packages
      - name: "Check-all"
        run: yarn workspace frontend-packages check-all
      - name: "Deploy to vercel"
        continue-on-error: true
        if: (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false) || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        uses: ndlano/reusable-workflows/.github/actions/vercel-deploy@main
        with:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          MASTER_ALIAS: "designmanual.ndla.no"
          REPO_NAME: "frontend-packages"
